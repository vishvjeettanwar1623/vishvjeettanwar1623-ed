<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" width="100%" height="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&amp;display=swap');

      .bg { fill: #0d1117; }

      .ascii-art {
        font-family: 'JetBrains Mono', 'Fira Code', 'Courier New', monospace;
        font-size: 13px;
        fill: #e6edf3;
        white-space: pre;
      }

      .ascii-header {
        font-family: 'JetBrains Mono', 'Fira Code', monospace;
        font-size: 13px;
        fill: #58a6ff;
        font-weight: 700;
      }

      .ascii-green { fill: #7ee787; font-weight: 700; }
      .ascii-coral { fill: #f78166; font-weight: 700; }
      .ascii-dim { fill: #8b949e; }

      /* Keycap animations */
      .key-active-v { animation: keyHighlightV 12s infinite; }
      .key-active-i { animation: keyHighlightI 12s infinite; }
      .key-active-s { animation: keyHighlightS 12s infinite; }
      .key-active-h { animation: keyHighlightH 12s infinite; }
      .key-active-j { animation: keyHighlightJ 12s infinite; }
      .key-active-e { animation: keyHighlightE 12s infinite; }
      .key-active-t { animation: keyHighlightT 12s infinite; }

      @keyframes keyHighlightV {
        0%, 28% { fill: #e6edf3; }
        29%, 33% { fill: #58a6ff; font-weight: 700; }
        34%, 100% { fill: #e6edf3; }
      }
      @keyframes keyHighlightI {
        0%, 34% { fill: #e6edf3; }
        35%, 39% { fill: #58a6ff; font-weight: 700; }
        40%, 100% { fill: #e6edf3; }
      }
      @keyframes keyHighlightS {
        0%, 40% { fill: #e6edf3; }
        41%, 45% { fill: #7ee787; font-weight: 700; }
        46%, 100% { fill: #e6edf3; }
      }
      @keyframes keyHighlightH {
        0%, 46% { fill: #e6edf3; }
        47%, 51% { fill: #7ee787; font-weight: 700; }
        52%, 100% { fill: #e6edf3; }
      }
      @keyframes keyHighlightJ {
        0%, 52% { fill: #e6edf3; }
        53%, 57% { fill: #58a6ff; font-weight: 700; }
        58%, 100% { fill: #e6edf3; }
      }
      @keyframes keyHighlightE {
        0%, 58% { fill: #e6edf3; }
        59%, 63% { fill: #f78166; font-weight: 700; }
        64%, 100% { fill: #e6edf3; }
      }
      @keyframes keyHighlightT {
        0%, 64% { fill: #e6edf3; }
        65%, 69% { fill: #f78166; font-weight: 700; }
        70%, 100% { fill: #e6edf3; }
      }

      /* Typewriter line reveals */
      .type-l1 { clip-path: url(#clip-m1); animation: revealM1 12s infinite; }
      .type-l2 { clip-path: url(#clip-m2); animation: revealM2 12s infinite; }
      .type-l3 { clip-path: url(#clip-m3); animation: revealM3 12s infinite; }
      .type-l4 { clip-path: url(#clip-m4); animation: revealM4 12s infinite; }

      @keyframes revealM1 {
        0%, 15% { width: 0px; }
        32%, 88% { width: 560px; }
        94%, 100% { width: 0px; }
      }
      @keyframes revealM2 {
        0%, 33% { width: 0px; }
        50%, 88% { width: 560px; }
        94%, 100% { width: 0px; }
      }
      @keyframes revealM3 {
        0%, 51% { width: 0px; }
        68%, 88% { width: 560px; }
        94%, 100% { width: 0px; }
      }
      @keyframes revealM4 {
        0%, 69% { width: 0px; }
        82%, 88% { width: 560px; }
        94%, 100% { width: 0px; }
      }

      .cursor-blink {
        fill: #58a6ff;
        animation: blinkCursor 0.8s infinite alternate;
      }
      @keyframes blinkCursor { 0% { opacity: 1; } 100% { opacity: 0; } }
    </style>

    <clipPath id="clip-m1"><rect class="type-l1" x="130" y="100" width="0" height="30" /></clipPath>
    <clipPath id="clip-m2"><rect class="type-l2" x="130" y="130" width="0" height="30" /></clipPath>
    <clipPath id="clip-m3"><rect class="type-l3" x="130" y="160" width="0" height="30" /></clipPath>
    <clipPath id="clip-m4"><rect class="type-l4" x="130" y="190" width="0" height="30" /></clipPath>
  </defs>

  <!-- Background -->
  <rect class="bg" width="800" height="480" rx="10" stroke="#30363d" stroke-width="1" />

  <!-- ASCII MONITOR CRT FRAME -->
  <g transform="translate(90, 25)">
    <!-- Top Monitor Frame ASCII -->
    <text x="0" y="20" class="ascii-art ascii-dim">┌─────────────────────────────────────────────────────────────┐</text>
    <text x="0" y="40" class="ascii-art ascii-header">│  vishvjeet@dev:~$ cat bio.txt                               │</text>
    <text x="0" y="60" class="ascii-art ascii-dim">├─────────────────────────────────────────────────────────────┤</text>

    <!-- Monitor Side Borders -->
    <text x="0" y="80" class="ascii-art ascii-dim">│                                                             │</text>
    <text x="0" y="100" class="ascii-art ascii-dim">│                                                             │</text>
    <text x="0" y="120" class="ascii-art ascii-dim">│                                                             │</text>
    <text x="0" y="140" class="ascii-art ascii-dim">│                                                             │</text>
    <text x="0" y="160" class="ascii-art ascii-dim">│                                                             │</text>
    <text x="0" y="180" class="ascii-art ascii-dim">│                                                             │</text>
    <text x="0" y="200" class="ascii-art ascii-dim">│                                                             │</text>
    <text x="0" y="220" class="ascii-art ascii-dim">│                                                             │</text>
    <text x="0" y="240" class="ascii-art ascii-dim">└─────────────────────────────────────────────────────────────┘</text>

    <!-- Monitor Stand ASCII -->
    <text x="0" y="258" class="ascii-art ascii-dim">                      \_________________/                      </text>
    <text x="0" y="272" class="ascii-art ascii-dim">                             |||                               </text>
    <text x="0" y="286" class="ascii-art ascii-dim">                       [=============]                         </text>

    <!-- Monitor Terminal Output Content (Clipping Reveals) -->
    <g clip-path="url(#clip-m1)">
      <text x="32" y="100" class="ascii-art"><tspan class="ascii-green">&gt; USER:</tspan> Vishvjeet Tanwar (<tspan class="ascii-header">vishvjeettanwar1623</tspan>)</text>
    </g>
    <g clip-path="url(#clip-m2)">
      <text x="32" y="130" class="ascii-art"><tspan class="ascii-green">&gt; ROLE:</tspan> Software Engineer &amp; Full Stack Architect</text>
    </g>
    <g clip-path="url(#clip-m3)">
      <text x="32" y="160" class="ascii-art"><tspan class="ascii-green">&gt; TECH:</tspan> TypeScript | JavaScript | Python | HTML/CSS</text>
    </g>
    <g clip-path="url(#clip-m4)">
      <text x="32" y="190" class="ascii-art"><tspan class="ascii-green">&gt; GOAL:</tspan> Building scalable web apps &amp; clean interfaces <tspan class="ascii-coral">★</tspan></text>
    </g>
  </g>

  <!-- ASCII KEYBOARD FRAME & KEYS -->
  <g transform="translate(90, 325)">
    <text x="0" y="20" class="ascii-art ascii-dim">┌─────────────────────────────────────────────────────────────┐</text>
    
    <!-- Row 1: Function Keys -->
    <text x="0" y="40" class="ascii-art">│ [Esc]  [F1] [F2] [F3] [F4]   [F5] [F6] [F7] [F8]   [F9][F10]│</text>
    
    <!-- Row 2: Number Keys -->
    <text x="0" y="60" class="ascii-art">│ [`] [1] [2] [3] [4] [5] [6] [7] [8] [9] [0] [-] [=] [Bksp]  │</text>
    
    <!-- Row 3: QWERTY -->
    <text x="24" y="80" class="ascii-art">│ [Tab]   [Q] [W] </text>
    <text x="144" y="80" class="ascii-art key-active-e">[E]</text>
    <text x="168" y="80" class="ascii-art">[R] </text>
    <text x="200" y="80" class="ascii-art key-active-t">[T]</text>
    <text x="224" y="80" class="ascii-art">[Y] [U] </text>
    <text x="288" y="80" class="ascii-art key-active-i">[I]</text>
    <text x="312" y="80" class="ascii-art">[O] [P] [ [ ] [ ] ] │</text>
    
    <!-- Row 4: ASDF -->
    <text x="24" y="100" class="ascii-art">│ [Caps]  [A] </text>
    <text x="136" y="100" class="ascii-art key-active-s">[S]</text>
    <text x="160" y="100" class="ascii-art">[D] [F] [G] </text>
    <text x="232" y="100" class="ascii-art key-active-h">[H]</text>
    <text x="256" y="100" class="ascii-art font-bold key-active-j">[J]</text>
    <text x="280" y="100" class="ascii-art">[K] [L] [ ; ] [ ' ] [↵]  │</text>
    
    <!-- Row 5: ZXCV -->
    <text x="24" y="120" class="ascii-art">│ [Shift]  [Z] [X] [C] </text>
    <text x="184" y="120" class="ascii-art key-active-v">[V]</text>
    <text x="208" y="120" class="ascii-art">[B] [N] [M] [ , ] [ . ] [/] [Shift]│</text>
    
    <!-- Row 6: Spacebar -->
    <text x="0" y="140" class="ascii-art">│ [Ctrl] [Win] [Alt]    [======= SPACE =======]   [Alt] [Ctrl]│</text>
    
    <text x="0" y="155" class="ascii-art ascii-dim">└─────────────────────────────────────────────────────────────┘</text>
  </g>
</svg>
