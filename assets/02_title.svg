<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 70" width="100%" height="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&amp;display=swap');
      .bg { fill: #0d0b0a; }
      .title-text {
        font-family: 'JetBrains Mono', 'DM Mono', 'Courier New', monospace;
        font-weight: 500;
        font-size: 20px;
        fill: #f0ede6;
        letter-spacing: 8px;
        text-anchor: middle;
      }
      .accent-line {
        stroke: #b4544a;
        stroke-width: 1.5;
        stroke-linecap: round;
      }
      .dim-line {
        stroke: #f0ede6;
        stroke-opacity: 0.3;
        stroke-width: 1;
        stroke-dasharray: 4 4;
      }
    </style>
  </defs>

  <rect class="bg" width="800" height="70" rx="6" />

  <!-- Symmetric subtle pen lines -->
  <line x1="80" y1="35" x2="230" y2="35" class="dim-line" />
  <circle cx="235" cy="35" r="3" fill="#b4544a" />
  
  <text x="404" y="42" class="title-text">BUILDER &amp; DESIGNER</text>

  <circle cx="565" cy="35" r="3" fill="#b4544a" />
  <line x1="570" y1="35" x2="720" y2="35" class="dim-line" />
  
  <!-- Subtle accent detail under text -->
  <line x1="380" y1="54" x2="420" y2="54" class="accent-line" />
</svg>
